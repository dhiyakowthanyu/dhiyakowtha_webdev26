<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flexbox Layouts</title>
    <!-- https://fonts.google.com/icons -->
    <link
      rel="stylesheet"

  <body>
    <h2>Flexbox default justification and alignment</h2>
    <div class = "container">
      <div class = "item center">1</div> 
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify start, Align start</h2>
    <div class = "container">
      <div class = "item center">1</div> 
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify End, Align end</h2>
    <div class = "container">
      <div class = "item center">1</div> 
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify Around, Align center</h2>
    <div class = "container">
      <div class = "item center">1</div> 
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify Event, Align center</h2>
    <div class = "container">
      <div class = "item center">1</div> 
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
